<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GTA Map Manager</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { height:100%; margin:0; font-family:Arial; }
#map { height:100%; }

#sidebar{
position:absolute;
top:10px; left:60px;
width:300px; max-height:95%;
overflow-y:auto;
background:#1e1e1e; color:white;
padding:10px; border-radius:8px;
z-index:1000;
}

.menu-section{margin-bottom:10px;border-radius:6px;background:#2a2a2a;overflow:hidden;}
.menu-header{padding:10px;background:#333;cursor:pointer;font-weight:bold;}
.menu-header:hover{background:#444;}
.menu-content{display:none;padding:10px;}
.menu-section.active .menu-content{display:block;}

input,select,button{width:100%;margin-bottom:5px;padding:6px;}
button{cursor:pointer;}

/* CATEGORY UI */
#categoryFilters label{
display:flex;
justify-content:space-between;
align-items:center;
background:#333;
padding:6px 10px;
border-radius:6px;
margin-bottom:5px;
cursor:pointer;
}
#categoryFilters label:hover{background:#444;}

.cat-left{
display:flex;
align-items:center;
gap:6px;
}

/* popup */
.popup-img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
margin:6px 0;
}
</style>
</head>
<body>

<div id="sidebar">

<div class="menu-section">
<div class="menu-header">📍 เพิ่มหมุด</div>
<div class="menu-content">
<input id="title" placeholder="ชื่อหมุด">
<input id="image" placeholder="URL รูป">
<select id="categorySelect"></select>
<button onclick="startAddMarker()">วางหมุด</button>
</div>
</div>

<div class="menu-section">
<div class="menu-header">📂 หมวด</div>
<div class="menu-content">
<input id="newCategory" placeholder="ชื่อหมวด">
<button onclick="addCategory()">เพิ่ม</button>
</div>
</div>

<div class="menu-section">
<div class="menu-header">👁 แสดงหมวด</div>
<div class="menu-content" id="categoryFilters"></div>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyC4QDd8ZI6l8Ua0EakNY7dsxxDyrwDUlgk",
  authDomain: "kyanite-9a82a.firebaseapp.com",
  projectId: "kyanite-9a82a",
  storageBucket: "kyanite-9a82a.firebasestorage.app",
  messagingSenderId: "410749272189",
  appId: "1:410749272189:web:64ec3562d3b75a961e7114"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= MAP ================= */

var mapExtent=[0,-5010,3677,0];
var crs=L.CRS.Simple;
crs.transformation = new L.Transformation(1, 0, -1, 0);

var map=L.map('map',{minZoom:0,maxZoom:5,crs:crs});

var southWest=crs.unproject(L.point(mapExtent[0],mapExtent[1]));
var northEast=crs.unproject(L.point(mapExtent[2],mapExtent[3]));
var bounds=L.latLngBounds(southWest,northEast);

// ⚠️ แก้ path ตามโฟลเดอร์ของคุณ
L.tileLayer('./{z}/{x}/{y}.png',{noWrap:true}).addTo(map);

map.fitBounds(bounds);
map.setMaxBounds(bounds.pad(0.5));

/* ================= DATA ================= */

let markers=[];
let categories=["ทั่วไป"];
let visibleCategories=[...categories];
let markerObjects=[];

/* ================= CATEGORY ================= */

function refreshCategoryUI(){
let select=document.getElementById("categorySelect");
let filterDiv=document.getElementById("categoryFilters");

select.innerHTML="";
filterDiv.innerHTML="";

categories.forEach(cat=>{

select.innerHTML+=`<option value="${cat}">${cat}</option>`;

let checked = visibleCategories.includes(cat) ? "checked" : "";

filterDiv.innerHTML+=`
<label>
    <div class="cat-left">
        <span>${cat}</span>
    </div>
    <input type="checkbox" ${checked} onchange="toggleCategory('${cat}',this.checked)">
</label>`;

});
}

function addCategory(){
let name=document.getElementById("newCategory").value.trim();
if(!name) return alert("ห้ามว่าง");
if(categories.includes(name)) return alert("ซ้ำ");

categories.push(name);
visibleCategories.push(name);

document.getElementById("newCategory").value="";
refreshCategoryUI();
refreshMarkers();
}

/* ================= MARKER ================= */

function startAddMarker(){
alert("คลิกบนแผนที่");

map.once("click",async function(e){

let title=document.getElementById("title").value.trim();
let image=document.getElementById("image").value.trim();
let category=document.getElementById("categorySelect").value;

if(!title) return alert("กรอกชื่อก่อน");

try{
await db.collection("markers").add({
lat:e.latlng.lat,
lng:e.latlng.lng,
title,
image,
category,
createdAt: Date.now()
});

// reset

document.getElementById("title").value="";
document.getElementById("image").value="";

alert("เพิ่มหมุดสำเร็จ");

}catch(err){
console.error(err);
alert("เพิ่มไม่สำเร็จ");
}

});
}

/* 🔥 realtime */

db.collection("markers")
.onSnapshot(snapshot=>{
markers=[];
snapshot.forEach(doc=>{
markers.push({id:doc.id,...doc.data()});
});
refreshMarkers();
},err=>{
console.error(err);
});

/* render */

function refreshMarkers(){
markerObjects.forEach(m=>map.removeLayer(m));
markerObjects=[];

markers.forEach(m=>{
if(!visibleCategories.includes(m.category)) return;

let marker=L.marker([m.lat,m.lng]).addTo(map);

marker.bindPopup(`
<b>${m.title}</b>
${m.image?`<img src="${m.image}" class="popup-img">`:""}
<br>${m.category}<br>
<button onclick="deleteMarker('${m.id}')">ลบ</button>
`);

markerObjects.push(marker);
});
}

/* delete */

async function deleteMarker(id){
if(!confirm("ลบจริง?")) return;

try{
await db.collection("markers").doc(id).delete();
}catch(err){
console.error(err);
alert("ลบไม่สำเร็จ");
}
}

/* filter */

function toggleCategory(cat,show){
if(show){
if(!visibleCategories.includes(cat)) visibleCategories.push(cat);
}else{
visibleCategories=visibleCategories.filter(c=>c!==cat);
}
refreshMarkers();
}

/* menu */

document.querySelectorAll(".menu-header").forEach(h=>{
h.onclick=()=>h.parentElement.classList.toggle("active");
});

/* init */
refreshCategoryUI();

</script>
</body>
</html>
