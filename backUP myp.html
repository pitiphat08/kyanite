<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GTA Map Manager</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { height:100%; margin:0; font-family:Arial; }
#map { height:100%; }

#sidebar{
position:absolute;
top:10px; left:60px;
width:300px; max-height:95%;
overflow-y:auto;
background:#1e1e1e; color:white;
padding:10px; border-radius:8px;
z-index:1000;
}

.menu-section{margin-bottom:10px;border-radius:6px;overflow:hidden;background:#2a2a2a;}
.menu-header{padding:10px;background:#333;cursor:pointer;font-weight:bold;}
.menu-header:hover{background:#444;}
.menu-content{padding:10px;display:none;}
.menu-section.active .menu-content{display:block;}

input,select,button{width:100%;margin-bottom:5px;padding:6px;}
button{cursor:pointer;}

#categoryFilters label{
display:flex;
align-items:center;
gap:6px;
margin-bottom:4px;
}
#categoryFilters input[type="checkbox"]{
width:auto;
margin:0;
}

/* ================= POPUP FIX ================= */

/* ล็อคความกว้าง popup */
.leaflet-popup-content-wrapper{
width:260px !important;
max-width:260px !important;
border-radius:12px;
}

.leaflet-popup-content{
width:240px !important;
margin:10px !important;
}

/* กล่องภายใน */
.custom-popup{
width:100%;
}

/* ล็อครูป */
.popup-img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
display:block;
margin-top:6px;
margin-bottom:6px;
}
</style>
</head>
<body>

<div id="sidebar">

<div class="menu-section">
<div class="menu-header">📍 เพิ่มหมุด</div>
<div class="menu-content">
<input type="text" id="title" placeholder="ชื่อหมุด">
<input type="text" id="image" placeholder="URL รูปแสดงใน Popup (เว้นว่างได้)">
<select id="categorySelect"></select>
<button onclick="startAddMarker()">คลิกเพื่อวางหมุด</button>
</div>
</div>

<div class="menu-section">
<div class="menu-header">📂 จัดการหมวดหมู่</div>
<div class="menu-content">
<input type="text" id="newCategory" placeholder="ชื่อหมวดใหม่">
<input type="text" id="newCategoryIcon" placeholder="URL icon หมวด (ใช้แสดงบนแผนที่)">
<button onclick="addCategory()">เพิ่มหมวด</button>

<select id="deleteCategorySelect"></select>
<button onclick="deleteCategory()">ลบหมวดที่เลือก</button>
</div>
</div>

<div class="menu-section">
<div class="menu-header">👁 เลือกหมวดที่แสดง</div>
<div class="menu-content" id="categoryFilters"></div>
</div>

<div class="menu-section">
<div class="menu-header">💾 Backup</div>
<div class="menu-content">
<button onclick="exportData()">Export JSON</button>
<input type="file" onchange="importData(event)">
</div>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= MAP ================= */

var mapExtent=[0,-5500,3677,0];
var mapMinZoom=0;
var mapMaxZoom=5;

var crs=L.CRS.Simple;
crs.transformation=new L.Transformation(1,-mapExtent[0],-1,mapExtent[3]);

var mapMinResolution=Math.pow(2,mapMaxZoom);
crs.scale=function(z){return Math.pow(2,z)/mapMinResolution;};
crs.zoom=function(s){return Math.log(s*mapMinResolution)/Math.LN2;};

var map=L.map('map',{minZoom:mapMinZoom,maxZoom:mapMaxZoom,crs:crs,maxBoundsViscosity:0.5});

var southWest=crs.unproject(L.point(mapExtent[0],mapExtent[1]));
var northEast=crs.unproject(L.point(mapExtent[2],mapExtent[3]));
var bounds=L.latLngBounds(southWest,northEast).pad(0.5);

L.tileLayer('{z}/{x}/{y}.png',{
minZoom:mapMinZoom,maxZoom:mapMaxZoom,
noWrap:true,bounds:bounds
}).addTo(map);

map.fitBounds(bounds);
map.setMaxBounds(bounds.pad(0.3));

/* ================= DATA ================= */

let markers=JSON.parse(localStorage.getItem("markers"))||[];
let categories = JSON.parse(localStorage.getItem("categories")) || [
    { name: "ทั่วไป", icon: "" }
];

categories = categories.map(c=>{
    if(typeof c==="string"){ return { name:c, icon:"" }; }
    return c;
});

if(categories.length===0){
    categories=[{ name:"ทั่วไป", icon:"" }];
}

let markerObjects=[];
let visibleCategories=categories.map(c=>c.name);

function saveData(){
localStorage.setItem("markers",JSON.stringify(markers));
localStorage.setItem("categories",JSON.stringify(categories));
}

/* ================= CATEGORY ================= */

function refreshCategoryUI(){

let select=document.getElementById("categorySelect");
let deleteSelect=document.getElementById("deleteCategorySelect");
let filterDiv=document.getElementById("categoryFilters");

select.innerHTML="";
deleteSelect.innerHTML="";
filterDiv.innerHTML="";

categories.forEach(cat=>{
select.innerHTML+=`<option value="${cat.name}">${cat.name}</option>`;
deleteSelect.innerHTML+=`<option value="${cat.name}">${cat.name}</option>`;
filterDiv.innerHTML+=`
<label>
<input type="checkbox" checked onchange="toggleCategory('${cat.name}',this.checked)">
${cat.icon?`<img src="${cat.icon}" width="16">`:""}
${cat.name}
</label>`;
});

visibleCategories=categories.map(c=>c.name);
}

function addCategory(){
let name=document.getElementById("newCategory").value.trim();
let icon=document.getElementById("newCategoryIcon").value.trim();
if(!name) return alert("ห้ามชื่อว่าง");
if(categories.some(c=>c.name===name)) return alert("ชื่อซ้ำ");
categories.push({ name, icon });
saveData();
refreshCategoryUI();
refreshMarkers();
}

function deleteCategory(){
let selected=document.getElementById("deleteCategorySelect").value;
if(!confirm("ลบหมวดนี้?"))return;
categories=categories.filter(c=>c.name!==selected);
markers=markers.filter(m=>m.category!==selected);
if(categories.length===0){
categories=[{ name:"ทั่วไป", icon:"" }];
}
saveData();
refreshCategoryUI();
refreshMarkers();
}

/* ================= MARKER ================= */

function startAddMarker(){
alert("คลิกที่แผนที่เพื่อวางหมุด");
map.once("click",function(e){
let title=document.getElementById("title").value.trim();
let image=document.getElementById("image").value.trim();
let category=document.getElementById("categorySelect").value;
markers.push({ lat:e.latlng.lat, lng:e.latlng.lng, title, image, category });
saveData();
refreshMarkers();
});
}

function refreshMarkers(){

markerObjects.forEach(m=>map.removeLayer(m));
markerObjects=[];

markers.forEach((m,index)=>{

if(!visibleCategories.includes(m.category))return;

let categoryObj = categories.find(c=>c.name===m.category);
let marker;

if(categoryObj && categoryObj.icon){
let customIcon=L.icon({
iconUrl:categoryObj.icon,
iconSize:[40,40],
iconAnchor:[20,40]
});
marker=L.marker([m.lat,m.lng],{icon:customIcon});
}else{
marker=L.marker([m.lat,m.lng]);
}

marker.addTo(map);

marker.bindPopup(`
<div class="custom-popup">
<b>${m.title}</b>
${m.image?`<img src="${m.image}" class="popup-img">`:""}
หมวด: ${m.category}<br>
<button onclick="deleteMarker(${index})">ลบหมุด</button>
</div>
`);

markerObjects.push(marker);

});
}

function deleteMarker(index){
markers.splice(index,1);
saveData();
refreshMarkers();
}

function toggleCategory(cat,show){
if(show){
if(!visibleCategories.includes(cat))
visibleCategories.push(cat);
}else{
visibleCategories=visibleCategories.filter(c=>c!==cat);
}
refreshMarkers();
}

function exportData(){
let data={markers,categories};
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="map-backup.json";
a.click();
URL.revokeObjectURL(url);
}

function importData(event){
let file=event.target.files[0];
let reader=new FileReader();
reader.onload=function(e){
let data=JSON.parse(e.target.result);
markers=Array.isArray(data.markers)?data.markers:[];
categories=Array.isArray(data.categories)?data.categories:[{name:"ทั่วไป",icon:""}];
saveData();
refreshCategoryUI();
refreshMarkers();
};
reader.readAsText(file);
}

document.querySelectorAll(".menu-header").forEach(header=>{
header.addEventListener("click",()=>{
header.parentElement.classList.toggle("active");
});
});

refreshCategoryUI();
refreshMarkers();

</script>
</body>
</html>
